<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service License Agreement - Cover Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

        /* --- THEME COLORS --- */
        :root {
            /* Default Flyburj Colors */
            --doc-primary: #800020; /* Dark Blue */
            --doc-accent: #D4AF37;  /* Tab/Light Blue */
            --doc-text: #ffffff;
            --doc-dark-text: #333333;
            --doc-gray-text: #777777;

            /* Uncomment the below lines to use Basmat Rooq Colors instead */
            /* --doc-primary: #800020; */ /* Burgundy */
            /* --doc-accent: #D4AF37; */  /* Gold */
        }

        /* --- PAGE SETUP --- */
        body {
            background-color: #e5e7eb; /* Light gray background for browser viewing */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .a4-page {
            width: 794px;  /* Standard A4 width at 96dpi */
            height: 1123px; /* Standard A4 height at 96dpi */
            background-color: white;
            position: relative;
            box-sizing: border-box;
            padding: 45px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* --- BACKGROUND SHAPES --- */
        .doc-bg-container {
            position: relative;
            width: 100%;
            height: 75%;
        }

        .doc-svg-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* --- FOREGROUND CONTENT --- */
        .doc-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            padding: 50px;
            color: var(--doc-text);
            box-sizing: border-box;
        }

        /* --- TOP RIGHT TAB --- */
        .doc-tab {
            position: absolute;
            top: 0;
            right: 40px;
            width: 60px;
            height: 100px;
            background-color: var(--doc-accent);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 15px;
            font-weight: 700;
            font-size: 16px;
            color: white;
            box-shadow: -2px 5px 10px rgba(0,0,0,0.15);
            z-index: 20;
        }

        /* --- LOGO SECTION --- */
        .doc-logo {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 30px;
        }
        
        .doc-logo-text {
            font-family: 'Arial', sans-serif;
            font-style: italic;
            font-weight: 800;
            font-size: 32px;
            margin-top: -5px;
            letter-spacing: -1px;
        }

        /* --- TYPOGRAPHY --- */
        .doc-title {
            font-size: 36px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin-top: 10px;
            max-width: 85%;
            line-height: 1.2;
        }

        /* --- PREPARED FOR SECTION --- */
        .doc-prepared-for {
            position: absolute;
            bottom: 120px;
            left: 50px;
            width: calc(100% - 100px);
        }

        .doc-prepared-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .doc-field-row {
            display: flex;
            align-items: flex-end;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .doc-field-label {
            margin-right: 8px;
            white-space: nowrap;
        }

        .doc-field-value {
            border-bottom: 1px solid rgba(255,255,255,0.8);
            padding-bottom: 2px;
            min-width: 280px;
            font-weight: 600;
        }

        /* --- FOOTER --- */
        .doc-footer {
            position: absolute;
            bottom: 45px;
            left: 45px;
            z-index: 10;
        }

        .doc-footer-company {
            color: var(--doc-dark-text);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            text-transform: uppercase;
        }

        .doc-footer-address {
            color: var(--doc-gray-text);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* --- PRINT CONFIGURATION --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }
            body {
                background: white;
                padding: 0;
                display: block;
            }
            .a4-page {
                box-shadow: none;
                margin: 0;
                padding: 45px;
                page-break-after: always;
            }
            /* Force browsers to print exact background colors and SVG shapes */
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>

    <!-- A4 PAGE CONTAINER -->
    <div class="a4-page">
        
        <div class="doc-bg-container">
            <!-- Floating Top Right Tab -->
            <div class="doc-tab">2026</div>
            
            <!-- Exact Curved Background -->
            <svg class="doc-svg-bg" viewBox="0 0 100 100" preserveAspectRatio="none">
                <!-- Light color bottom accent curve -->
                <path d="M0,0 L100,0 L100,88 Q50,103 0,88 Z" fill="var(--doc-accent)"/>
                <!-- Main dark color background curve -->
                <path d="M0,0 L100,0 L100,85 Q50,98 0,85 Z" fill="var(--doc-primary)"/>
            </svg>

            <!-- Text Content -->
            <div class="doc-content">
                
                <div class="doc-logo">
                    <!-- Vector Bird Icon -->
                    <svg width="55" height="55" viewBox="0 0 100 100" fill="white">
                        <path d="M30,75 C35,65 50,55 75,25 C60,40 50,55 50,85 C40,80 35,78 30,75 Z"/>
                        <path d="M25,65 C30,55 45,45 65,20 C50,35 45,50 40,75 C35,70 30,68 25,65 Z" opacity="0.6"/>
                        <path d="M20,55 C25,45 40,35 55,15 C40,30 35,45 30,65 C25,60 22,58 20,55 Z" opacity="0.3"/>
                    </svg>
                    <span class="doc-logo-text">Flyburj</span>
                </div>

                <h1 class="doc-title">SERVICE LICENSE AGREEMENT</h1>

                <div class="doc-prepared-for">
                    <div class="doc-prepared-title">Prepared For</div>
                    
                    <div class="doc-field-row">
                        <span class="doc-field-label">Client Name:</span>
                        <span class="doc-field-value">Mr. Bablu Ahmed</span>
                    </div>
                    
                    <div class="doc-field-row">
                        <span class="doc-field-label">Date:</span>
                        <span class="doc-field-value">February 18, 2026</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="doc-footer">
            <div class="doc-footer-company">FLYBURJ COMPANY</div>
            <div class="doc-footer-address">BURAYDAH , AL QASSIM-SAUDI ARABIA</div>
        </div>

    </div>

</body>
</html>
