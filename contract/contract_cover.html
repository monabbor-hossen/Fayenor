<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISA License Cover Page - Executive Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;800&display=swap');
        /* For Arabic Touch */

        /* --- BASMAT ROOQ PREMIUM THEME --- */
        :root {
            --theme-primary: #800020;
            /* Corporate Burgundy */
            --theme-accent: #D4AF37;
            /* Corporate Gold */
            --text-dark: #111111;
            --text-muted: #555555;
            --bg-offwhite: #fdfdfd;
        }

        /* --- ENVIRONMENT SETUP --- */
        body {
            background-color: #2b2b2b;
            /* Dark background for preview contrast */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- EXACT A4 DIMENSIONS --- */
        .a4-page {
            width: 794px;
            height: 1123px;
            background-color: var(--bg-offwhite);
            position: relative;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            box-sizing: border-box;
        }

        /* --- WATERMARK --- */
        .watermark {
            position: absolute;
            top: 50%;
            left: 60%;
            transform: translate(-50%, -50%);
            width: 600px;
            opacity: 0.03;
            pointer-events: none;
            z-index: 2;
            filter: brightness(0) drop-shadow(2px 0 0 white) drop-shadow(-2px 0 0 white) drop-shadow(0 2px 0 white) drop-shadow(0 -2px 0 white) invert(1);
            /* mask-image: linear-gradient(transparent, transparent); */
        }

        /* --- BACKGROUND SVG WAVES --- */
        .wave-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }

        /* --- CONTENT LAYER --- */
        .content-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        /* --- BRANDING / LOGO (Top Left) --- */
        .brand-container {
            position: absolute;
            top: 80px;
            left: 80px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .brand-icon-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 5px;
        }

        /* Adjusted icon size to fit the portrait aspect ratio of the fingerprint */
        .brand-icon-wrapper img {
            width: 30%;
            filter: brightness(0) invert(1);
        }

        .brand-text-block {
            display: flex;
            flex-direction: column;
        }

        .brand-name {
            font-size: 18px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 0.5px;
            line-height: 1;
        }

        .brand-tagline {
            font-size: 8px;
            font-weight: 700;
            color: var(--theme-accent);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 3px;
        }

        /* --- CENTER TYPOGRAPHY --- */
        .title-wrapper {
            position: absolute;
            top: 340px;
            left: 120px;
        }

        .doc-arabic {
            font-family: 'Cairo', sans-serif;
            font-size: 22px;
            font-weight: 800;
            color: var(--theme-accent);
            margin-bottom: -5px;
            margin-left: 5px;
        }

        .doc-subtitle {
            font-size: 18px;
            font-weight: 700;
            color: var(--theme-primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 5px;
            margin-left: 5px;
        }

        .doc-title {
            font-size: 90px;
            font-weight: 900;
            color: var(--text-dark);
            text-transform: uppercase;
            line-height: 0.95;
            letter-spacing: -3px;
            margin: 0;
            margin-bottom: 45px;
        }

        /* --- DATA PARAGRAPH (Premium Grid Layout) --- */
        .doc-data-box {
            border-left: 4px solid var(--theme-accent);
            padding-left: 25px;
            margin-left: 8px;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .data-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .data-icon {
            width: 16px;
            height: 16px;
            fill: var(--theme-primary);
            margin-top: 3px;
            opacity: 0.8;
        }

        .doc-data-text {
            font-size: 14px;
            line-height: 1.5;
            color: var(--text-muted);
            font-weight: 500;
            margin: 0;
        }

        .doc-data-text strong {
            font-weight: 800;
            color: var(--text-dark);
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        /* --- QR CODE (Bottom Left) --- */
        .qr-code {
            position: absolute;
            bottom: 60px;
            left: 80px;
            width: 80px;
            height: 80px;
            padding: 5px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .qr-text {
            position: absolute;
            bottom: 40px;
            left: 80px;
            font-size: 9px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        /* --- YEAR (Bottom Right) --- */
        .doc-year {
            position: absolute;
            bottom: 180px;
            right: 120px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .year-main {
            font-size: 55px;
            font-weight: 900;
            color: white;
            /* Changed to white to sit inside the burgundy wave */
            letter-spacing: -1px;
            line-height: 1;
        }

        .year-sub {
            font-size: 14px;
            font-weight: 600;
            color: var(--theme-accent);
            /* Gold Hijri year */
            letter-spacing: 2px;
            margin-top: 2px;
        }

        /* --- PRINT CONFIGURATION --- */
        @media print {
            @page {
                size: A4 portrait;
                margin: 0;
            }

            body {
                background: white;
                padding: 0;
                display: block;
            }

            .a4-page {
                box-shadow: none;
                margin: 0;
                page-break-after: always;
            }

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>

<body>

    <!-- A4 PAGE BOUNDARY -->
    <div class="a4-page">

        <!-- Subtle Background Watermark -->
        <img src="../assets/img/logo_transparent.png" class="watermark" alt="">

        <!-- ABSTRACT WAVES (With Premium Gold Accents) -->
        <svg class="wave-bg" viewBox="0 0 100 100" preserveAspectRatio="none">

            <!-- 1. Top Left Swoosh -->
            <path d="M 0,0 L 80,0 C 50,22 20,24 0,14 Z" fill="none" stroke="var(--theme-accent)" stroke-width="0.5"
                transform="translate(1, 1)" opacity="0.6" />
            <path d="M 0,0 L 80,0 C 50,22 20,24 0,14 Z" fill="var(--theme-primary)" />

            <!-- 2. Right Edge Curve -->
            <path d="M 100,22 C 85,35 85,55 100,68 Z" fill="var(--theme-accent)" opacity="0.8"
                transform="translate(-1.5, 0)" />
            <path d="M 100,22 C 85,35 85,55 100,68 Z" fill="var(--theme-primary)" />

            <!-- 3. Bottom Massive Wave (Now acts as a background for the Year) -->
            <path d="M 0,45 C 30,90 70,72 100,78 L 100,84 C 70,78 30,98 0,100 Z" fill="none"
                stroke="var(--theme-accent)" stroke-width="0.5" transform="translate(0, -1.5)" opacity="0.8" />
            <path d="M 0,45 C 30,90 70,72 100,78 L 100,84 C 70,78 30,98 0,100 Z" fill="var(--theme-primary)" />
        </svg>

        <!-- FOREGROUND CONTENT LAYER -->
        <div class="content-layer">

            <!-- LOGO AREA -->
            <div class="brand-container">
                <div class="brand-icon-wrapper">
                    <!-- Basmat Rooq Custom Fingerprint Logo -->
                    <img src="../assets/img/logo.png" alt="">

                </div>
            </div>

            <!-- MAIN TYPOGRAPHY & CLIENT DATA -->
            <div class="title-wrapper">
                <!-- Arabic Translation for authentic feel -->
                <div class="doc-arabic">ملف ترخيص وزارة الاستثمار</div>
                <div class="doc-subtitle">MISA INVESTOR</div>
                <h1 class="doc-title">LICENSE</h1>

                <!-- Upgraded Data Box with Icons and Gold Border -->
                <div class="doc-data-box">

                    <div class="data-row">
                        <svg class="data-icon" viewBox="0 0 24 24">
                            <path
                                d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z" />
                            </svg>
                        <p class="doc-data-text"><strong>Company Name</strong> Jahangir Contracting Ltd.</p>
                    </div>

                    <div class="data-row">
                        <svg class="data-icon" viewBox="0 0 24 24">
                            <path
                                d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z" />
                            </svg>
                        <p class="doc-data-text"><strong>Trade Name</strong> ALSAMA SKR</p>
                    </div>

                    <div class="data-row">
                        <svg class="data-icon" viewBox="0 0 24 24">
                            <path
                                d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                            </svg>
                        <p class="doc-data-text"><strong>Client Representative</strong> Mr. Bablu Ahmed</p>
                    </div>

                    <div class="data-row">
                        <svg class="data-icon" viewBox="0 0 24 24">
                            <path
                                d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM7 10h5v5H7z" />
                            </svg>
                        <p class="doc-data-text"><strong>Date Issued</strong> February 18, 2026</p>
                    </div>

                </div>
            </div>

            <!-- YEAR (Layered over the bottom wave) -->
            <div class="doc-year">
                <span class="year-main">2026</span>
                <span class="year-sub">1447 HIJRI</span>
            </div>

        </div>
    </div>

</body>

</html>
